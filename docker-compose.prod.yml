version: '3.9'

# Production High-Availability Docker Compose
# Features:
# - PostgreSQL Primary + Replica with streaming replication
# - Redis Sentinel for automatic failover
# - 3x Node.js app instances behind Nginx load balancer
# - 2x BullMQ workers for horizontal scaling
# - Prometheus + Grafana monitoring
# - Health checks for all services

services:
  # ==================== DATABASE LAYER ====================
  
  # PostgreSQL Primary (read/write)
  postgres-primary:
    image: postgres:15-alpine
    container_name: devpulse-postgres-primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: devpulse
      POSTGRES_INITDB_ARGS: |
        -c max_wal_senders=10 
        -c wal_keep_size=1GB 
        -c max_replication_slots=10 
        -c hot_standby=on 
        -c hot_standby_feedback=on
    ports:
      - "5432:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./configs/postgres/primary:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - internal
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"

  # PostgreSQL Replica (read-only with potential promotion)
  postgres-replica:
    image: postgres:15-alpine
    container_name: devpulse-postgres-replica
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./configs/postgres/replica:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      postgres-primary:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        until PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres-primary -U postgres -c "SELECT 1" 2>/dev/null; do
          echo "Waiting for primary..."
          sleep 2
        done
        
        rm -rf /var/lib/postgresql/data/*
        PGPASSWORD=$$POSTGRES_PASSWORD pg_basebackup -h postgres-primary -D /var/lib/postgresql/data -U postgres -v -P -W -R
        
        echo "standby_mode = 'on'" >> /var/lib/postgresql/data/recovery.conf
        echo "primary_conninfo = 'host=postgres-primary user=postgres password=$$POSTGRES_PASSWORD port=5432'" >> /var/lib/postgresql/data/recovery.conf
        
        exec postgres -c hot_standby=on

  # ==================== CACHE LAYER (REDIS SENTINEL) ====================
  
  # Redis Master
  redis-master:
    image: redis:7-alpine
    container_name: devpulse-redis-master
    command: redis-server --port 6379 --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_master_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # Redis Replica 1
  redis-replica-1:
    image: redis:7-alpine
    container_name: devpulse-redis-replica-1
    command: redis-server --port 6379 --slaveof redis-master 6379 --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_replica_1_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - redis-master

  # Redis Replica 2
  redis-replica-2:
    image: redis:7-alpine
    container_name: devpulse-redis-replica-2
    command: redis-server --port 6379 --slaveof redis-master 6379 --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6381:6379"
    volumes:
      - redis_replica_2_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - redis-master

  # Redis Sentinel 1
  redis-sentinel-1:
    image: redis:7-alpine
    container_name: devpulse-redis-sentinel-1
    command: redis-sentinel /etc/redis/sentinel-1.conf
    ports:
      - "26379:26379"
    volumes:
      - ./configs/redis/sentinel-1.conf:/etc/redis/sentinel-1.conf:ro
      - sentinel_1_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - redis-master

  # Redis Sentinel 2
  redis-sentinel-2:
    image: redis:7-alpine
    container_name: devpulse-redis-sentinel-2
    command: redis-sentinel /etc/redis/sentinel-2.conf
    ports:
      - "26380:26379"
    volumes:
      - ./configs/redis/sentinel-2.conf:/etc/redis/sentinel-2.conf:ro
      - sentinel_2_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - redis-master

  # Redis Sentinel 3
  redis-sentinel-3:
    image: redis:7-alpine
    container_name: devpulse-redis-sentinel-3
    command: redis-sentinel /etc/redis/sentinel-3.conf
    ports:
      - "26381:26379"
    volumes:
      - ./configs/redis/sentinel-3.conf:/etc/redis/sentinel-3.conf:ro
      - sentinel_3_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - redis-master

  # ==================== APPLICATION LAYER ====================
  
  # Node.js Backend Instance 1
  app-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devpulse-app-1
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres-primary:5432/devpulse
      DATABASE_REPLICA_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres-replica:5432/devpulse
      REDIS_SENTINEL_HOSTS: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_SENTINEL_NAME: devpulse-master
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NODE_ENV: production
      PORT: 3000
      INSTANCE_ID: app-1
      LOG_LEVEL: info
    ports:
      - "3001:3000"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal
      - public
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Node.js Backend Instance 2
  app-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devpulse-app-2
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres-primary:5432/devpulse
      DATABASE_REPLICA_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres-replica:5432/devpulse
      REDIS_SENTINEL_HOSTS: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_SENTINEL_NAME: devpulse-master
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NODE_ENV: production
      PORT: 3000
      INSTANCE_ID: app-2
      LOG_LEVEL: info
    ports:
      - "3002:3000"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal
      - public
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Node.js Backend Instance 3
  app-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devpulse-app-3
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres-primary:5432/devpulse
      DATABASE_REPLICA_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres-replica:5432/devpulse
      REDIS_SENTINEL_HOSTS: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_SENTINEL_NAME: devpulse-master
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NODE_ENV: production
      PORT: 3000
      INSTANCE_ID: app-3
      LOG_LEVEL: info
    ports:
      - "3003:3000"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal
      - public
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # ==================== WORKER LAYER ====================
  
  # BullMQ Worker Instance 1
  worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devpulse-worker-1
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres-primary:5432/devpulse
      REDIS_SENTINEL_HOSTS: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_SENTINEL_NAME: devpulse-master
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NODE_ENV: production
      WORKER_ID: worker-1
      WORKER_CONCURRENCY: 5
      LOG_LEVEL: info
    command: npm run worker
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    cap_drop:
      - ALL

  # BullMQ Worker Instance 2
  worker-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devpulse-worker-2
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres-primary:5432/devpulse
      REDIS_SENTINEL_HOSTS: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_SENTINEL_NAME: devpulse-master
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NODE_ENV: production
      WORKER_ID: worker-2
      WORKER_CONCURRENCY: 5
      LOG_LEVEL: info
    command: npm run worker
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    cap_drop:
      - ALL

  # ==================== FRONTEND & REVERSE PROXY ====================
  
  # Nginx Reverse Proxy with HA Load Balancing
  nginx:
    image: nginx:alpine
    container_name: devpulse-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./configs/nginx/nginx-ha.conf:/etc/nginx/nginx.conf:ro
      - ./configs/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app-1
      - app-2
      - app-3
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - public

  # ==================== MONITORING ====================
  
  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: devpulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus/prometheus-ha.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - internal

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: devpulse-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_INSTALL_PLUGINS: 'redis-datasource'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./configs/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - internal

  # Redis Exporter for Prometheus
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: devpulse-redis-exporter
    ports:
      - "9121:9121"
    command:
      - "-redis.addr=sentinel://${REDIS_PASSWORD}@redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379"
      - "-redis.sentinel-master=devpulse-master"
      - "-namespace=devpulse"
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - redis-sentinel-1

  # PostgreSQL Exporter for Prometheus
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: devpulse-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres-primary:5432/postgres?sslmode=disable"
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - postgres-primary

volumes:
  postgres_primary_data:
  postgres_replica_data:
  redis_master_data:
  redis_replica_1_data:
  redis_replica_2_data:
  sentinel_1_data:
  sentinel_2_data:
  sentinel_3_data:
  prometheus_data:
  grafana_data:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
