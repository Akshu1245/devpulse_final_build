# Default Helm Values for DevPulse Kubernetes Deployment
# Environment-specific overrides: values-dev.yaml, values-prod.yaml

global:
  environment: development
  domain: devpulse.example.com
  timezone: UTC

###############################################################################
# DevPulse Application Configuration
###############################################################################

app:
  # Deployment replicas
  replicaCount: 3
  
  # Container image
  image:
    repository: myregistry/devpulse-app
    pullPolicy: IfNotPresent
    tag: "latest"
  
  # Image pull secrets for private registries
  imagePullSecrets: []
    # - name: regcred
  
  # Service account
  serviceAccount:
    create: true
    annotations: {}
    name: devpulse
  
  # Pod annotations
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
  
  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  
  # Container security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  
  # Service configuration
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
    annotations: {}
  
  # Container port
  containerPort: 3000
  
  # Health check probes
  probes:
    startup:
      enabled: true
      httpGet:
        path: /health/startup
        port: 3000
      failureThreshold: 30
      periodSeconds: 10
    
    readiness:
      enabled: true
      httpGet:
        path: /health/ready
        port: 3000
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
    
    liveness:
      enabled: true
      httpGet:
        path: /health/live
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
  
  # Resource requests and limits
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1024Mi
  
  # Node affinity (prefer specific node types)
  nodeAffinity:
    requiredDuringScheduling: []
    preferredDuringScheduling:
      - weight: 100
        preference:
          matchExpressions:
            - key: node.kubernetes.io/instance-type
              operator: In
              values:
                - t3.large
                - t3.xlarge
                - m5.large
  
  # Pod affinity (spread across nodes)
  podAntiAffinity:
    type: preferred  # preferred or required
    weight: 100
    topologyKey: kubernetes.io/hostname
  
  # Update strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  
  # Lifecycle hooks
  lifecycle:
    preStop:
      exec:
        command: ["/bin/sh", "-c", "sleep 15"]
    postStart: {}
  
  # Environment variables
  env:
    NODE_ENV: production
    LOG_LEVEL: info
    PORT: "3000"
  
  # Environment variables from secrets/configmaps
  envFrom:
    - configMapRef:
        name: devpulse-config
    - secretRef:
        name: devpulse-secrets
  
  # Volume mounts
  volumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: cache
      mountPath: /app/cache
  
  # Toleration for node taints
  tolerations: []

###############################################################################
# Horizontal Pod Autoscaler (HPA)
###############################################################################

autoscaling:
  app:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
    
    # Advanced scaling behavior
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 50
            periodSeconds: 60
          - type: Pods
            value: 1
            periodSeconds: 60
        selectPolicy: Min
      
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Percent
            value: 100
            periodSeconds: 60
          - type: Pods
            value: 2
            periodSeconds: 60
        selectPolicy: Max
  
  worker:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilization: 75
    targetMemoryUtilization: 85

###############################################################################
# PostgreSQL Database Configuration
###############################################################################

database:
  enabled: true
  
  # StatefulSet configuration
  replicas: 2  # Primary + Replica
  
  # Image
  image:
    repository: postgres
    tag: "14-alpine"
    pullPolicy: IfNotPresent
  
  # Service
  service:
    type: ClusterIP
    port: 5432
    headless: true
  
  # Resources
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  
  # Storage
  storage:
    enabled: true
    size: 100Gi
    storageClass: gp2
    accessMode: ReadWriteOnce
  
  # Persistence
  persistence:
    enabled: true
    path: /var/lib/postgresql/data
  
  # Root password (from secret)
  rootPassword:
    existingSecret: db-credentials
    existingSecretPasswordKey: password
  
  # Database configuration
  config:
    maxConnections: "200"
    sharedBuffers: "256MB"
    effectiveCacheSize: "1GB"
    maintenanceWorkMem: "64MB"
    checkpointCompletionTarget: "0.9"
    walBuffers: "16MB"
    defaultStatisticsTarget: "100"
  
  # Backup configuration
  backup:
    enabled: true
    schedule: "0 2 * * *"  # Daily at 2 AM UTC
    retention: 30           # days
  
  # Health checks
  probes:
    enabled: true
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 5

###############################################################################
# Redis Cache Configuration
###############################################################################

redis:
  enabled: true
  
  # StatefulSet configuration
  replicas: 3  # Master + 2 Replicas
  
  # Image
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  
  # Service
  service:
    type: ClusterIP
    port: 6379
    headless: true
  
  # Resources
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  # Storage
  storage:
    enabled: true
    size: 50Gi
    storageClass: gp2
    accessMode: ReadWriteOnce
  
  # High availability
  highAvailability:
    enabled: true
    sentinel:
      enabled: true
      replicas: 3
      port: 26379
  
  # Password (from secret)
  password:
    existingSecret: redis-credentials
    existingSecretPasswordKey: password
  
  # Configuration
  config:
    maxmemory: "1gb"
    maxmemoryPolicy: "allkeys-lru"
    timeout: "300"
    tcpBacklog: "511"
  
  # Health checks
  probes:
    enabled: true
    liveness:
      initialDelaySeconds: 15
      periodSeconds: 10
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 3

###############################################################################
# Worker Configuration (BullMQ)
###############################################################################

worker:
  enabled: true
  
  # Deployment replicas
  replicaCount: 2
  
  # Image
  image:
    repository: myregistry/devpulse-worker
    pullPolicy: IfNotPresent
    tag: "latest"
  
  # Service
  service:
    enabled: true
    type: ClusterIP
    port: 3001
  
  # Resources
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1024Mi
  
  # Queue configuration
  queue:
    concurrency: 5
    defaultJobOptions:
      removeOnComplete: true
      removeOnFail: false
      attempts: 3
      backoff:
        type: exponential
        delay: 2000

###############################################################################
# Ingress Configuration
###############################################################################

ingress:
  enabled: true
  className: nginx
  
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  
  # TLS configuration
  tls:
    enabled: true
    issuer: letsencrypt-prod
  
  # Hosts and paths
  hosts:
    - host: devpulse.example.com
      paths:
        - path: /
          pathType: Prefix
          service: devpulse-app
          servicePort: 3000
    
    - host: api.devpulse.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: devpulse-app
          servicePort: 3000

###############################################################################
# Network Policies
###############################################################################

networkPolicy:
  enabled: true
  
  policyTypes:
    - Ingress
    - Egress
  
  ingress:
    enabled: true
    # Allow from Ingress controller
    fromNamespaces:
      - ingress-nginx
    # Allow pod-to-pod
    podToPod: true
  
  egress:
    enabled: true
    # Allow DNS
    dns: true
    # Allow to databases
    toDatabases: true
    # Allow external HTTPS
    external: true

###############################################################################
# RBAC Configuration
###############################################################################

rbac:
  enabled: true
  
  # Create service account
  serviceAccount:
    create: true
    name: devpulse
  
  # Create cluster role and binding
  clusterRole:
    create: true
  
  # Role rules
  rules:
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list", "watch"]
    
    - apiGroups: [""]
      resources: ["services"]
      verbs: ["get", "list"]
    
    - apiGroups: [""]
      resources: ["configmaps"]
      verbs: ["get", "list"]

###############################################################################
# Pod Disruption Budgets
###############################################################################

podDisruptionBudget:
  enabled: true
  
  app:
    minAvailable: 2
    maxUnavailable: null
  
  database:
    minAvailable: 1
    maxUnavailable: null
  
  redis:
    minAvailable: 2
    maxUnavailable: null

###############################################################################
# Monitoring & Observability
###############################################################################

monitoring:
  enabled: true
  
  # Prometheus
  prometheus:
    enabled: true
    retention: 15d
    storageSize: 50Gi
    
    serviceMonitor:
      enabled: true
      interval: 30s
      path: /metrics
    
    # Alert rules
    alerts:
      enabled: true
      rules:
        - alert: HighCPUUtilization
          expr: 'cpu_usage_percent > 80'
          duration: 5m
        
        - alert: HighMemoryUtilization
          expr: 'memory_usage_percent > 85'
          duration: 5m
        
        - alert: DatabaseConnectionPoolExhausted
          expr: 'db_connection_pool_exhausted'
          duration: 2m
  
  # Grafana
  grafana:
    enabled: true
    adminPassword: admin
    
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
    
    dashboards:
      enabled: true
      files:
        - devpulse-overview.json
        - devpulse-database.json
        - devpulse-redis.json
        - devpulse-applications.json

###############################################################################
# Backup & Disaster Recovery
###############################################################################

backup:
  enabled: true
  
  # Database backups
  database:
    enabled: true
    schedule: "0 2 * * *"
    retention: 30
    type: full
  
  # S3 configuration
  s3:
    enabled: true
    bucket: devpulse-backups
    region: us-east-1
    accessKey:
      existingSecret: s3-credentials
      existingSecretKey: accessKey
    secretKey:
      existingSecret: s3-credentials
      existingSecretKey: secretKey
    
    # Lifecycle policies
    lifecycle:
      - expirationDays: 30
        transitionToDays: 7
        transitionToClass: STANDARD_IA
      
      - expirationDays: 90
        transitionToDays: 30
        transitionToClass: GLACIER

###############################################################################
# Secrets Management
###############################################################################

secrets:
  # Database credentials
  database:
    existingSecret: db-credentials
    usernameKey: username
    passwordKey: password
    host: devpulse-db
    port: "5432"
    database: devpulse
  
  # Redis credentials
  redis:
    existingSecret: redis-credentials
    passwordKey: password
    host: devpulse-redis
    port: "6379"
  
  # Application secrets
  application:
    existingSecret: devpulse-secrets
    keys:
      - JWT_SECRET
      - API_KEY
      - ENCRYPTION_SECRET

###############################################################################
# ConfigMaps
###############################################################################

configMap:
  # Application configuration
  application:
    LOG_LEVEL: info
    NODE_ENV: production
    ENABLE_MONITORING: "true"
    ENABLE_TRACING: "true"
    METRICS_PORT: "9090"

###############################################################################
# Testing & Validation
###############################################################################

tests:
  enabled: false
  
  integration:
    enabled: false
    image: myregistry/devpulse-tests
    tag: latest
  
  smoke:
    enabled: false
    endpoints:
      - http://devpulse-app:3000/health
      - http://devpulse-app:3000/api/status

###############################################################################
# Multi-Region Configuration (Optional)
###############################################################################

multiRegion:
  enabled: false
  
  regions:
    - name: us-east-1
      primary: true
      replicas: 3
      workers: 2
    
    - name: eu-west-1
      primary: false
      replicas: 2
      workers: 1
  
  # DNS failover
  dnsFailover:
    enabled: false
    provider: route53
    ttl: 60
