{{- if .Values.autoscaling.app.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "devpulse.fullname" . }}-app
  labels:
    {{- include "devpulse.labels" . | nindent 4 }}
    component: app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "devpulse.fullname" . }}-app
  
  minReplicas: {{ .Values.autoscaling.app.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.app.maxReplicas }}
  
  metrics:
    {{- if .Values.autoscaling.app.targetCPUUtilization }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.app.targetCPUUtilization }}
    {{- end }}
    
    {{- if .Values.autoscaling.app.targetMemoryUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.app.targetMemoryUtilization }}
    {{- end }}
  
  {{- if .Values.autoscaling.app.behavior }}
  behavior:
    {{- if .Values.autoscaling.app.behavior.scaleDown }}
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.autoscaling.app.behavior.scaleDown.stabilizationWindowSeconds }}
      policies:
        {{- range .Values.autoscaling.app.behavior.scaleDown.policies }}
        - type: {{ .type }}
          value: {{ .value }}
          periodSeconds: {{ .periodSeconds }}
        {{- end }}
      selectPolicy: {{ .Values.autoscaling.app.behavior.scaleDown.selectPolicy }}
    {{- end }}
    
    {{- if .Values.autoscaling.app.behavior.scaleUp }}
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.autoscaling.app.behavior.scaleUp.stabilizationWindowSeconds }}
      policies:
        {{- range .Values.autoscaling.app.behavior.scaleUp.policies }}
        - type: {{ .type }}
          value: {{ .value }}
          periodSeconds: {{ .periodSeconds }}
        {{- end }}
      selectPolicy: {{ .Values.autoscaling.app.behavior.scaleUp.selectPolicy }}
    {{- end }}
  {{- end }}

---
{{- end }}

{{- if .Values.autoscaling.worker.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "devpulse.fullname" . }}-worker
  labels:
    {{- include "devpulse.labels" . | nindent 4 }}
    component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "devpulse.fullname" . }}-worker
  
  minReplicas: {{ .Values.autoscaling.worker.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.worker.maxReplicas }}
  
  metrics:
    {{- if .Values.autoscaling.worker.targetCPUUtilization }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.worker.targetCPUUtilization }}
    {{- end }}
    
    {{- if .Values.autoscaling.worker.targetMemoryUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.worker.targetMemoryUtilization }}
    {{- end }}

{{- end }}
