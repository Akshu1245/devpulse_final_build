{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "devpulse.fullname" . }}
  labels:
    {{- include "devpulse.labels" . | nindent 4 }}
    component: ingress
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  
  {{- if .Values.ingress.tls.enabled }}
  tls:
    {{- range .Values.ingress.hosts }}
    {{- if .tls }}
    - hosts:
        {{- if .tls.secretName }}
        - {{ .host | quote }}
        {{- end }}
      secretName: {{ .tls.secretName | default (printf "%s-tls" (replace "." "-" .host)) | quote }}
    {{- end }}
    {{- end }}
  {{- end }}
  
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ .service | default (include "devpulse.fullname" $) }}
                port:
                  number: {{ .servicePort | default 3000 }}
          {{- end }}
    {{- end }}

{{- end }}
