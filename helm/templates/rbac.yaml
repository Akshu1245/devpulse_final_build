{{- if .Values.rbac.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.serviceAccount.name | default (include "devpulse.serviceAccountName" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devpulse.labels" . | nindent 4 }}
  {{- with .Values.rbac.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}

---

{{- if .Values.rbac.clusterRole.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "devpulse.fullname" . }}
  labels:
    {{- include "devpulse.labels" . | nindent 4 }}
rules:
  {{- range .Values.rbac.rules }}
  - apiGroups: {{ .apiGroups | toJson }}
    resources: {{ .resources | toJson }}
    {{- if .resourceNames }}
    resourceNames: {{ .resourceNames | toJson }}
    {{- end }}
    verbs: {{ .verbs | toJson }}
  {{- end }}

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "devpulse.fullname" . }}
  labels:
    {{- include "devpulse.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "devpulse.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.serviceAccount.name | default (include "devpulse.serviceAccountName" .) }}
    namespace: {{ .Release.Namespace }}

{{- end }}

{{- end }}
