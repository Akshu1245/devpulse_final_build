  {{- end }}
  {{- if .Values.podDisruptionBudget.database.maxUnavailable }}
  maxUnavailable: {{ .Values.podDisruptionBudget.database.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "devpulse.selectorLabels" . | nindent 6 }}
