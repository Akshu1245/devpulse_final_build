{{- if .Values.podDisruptionBudget.enabled }}

{{- if .Values.podDisruptionBudget.app }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "devpulse.fullname" . }}-app
  labels:
    {{- include "devpulse.labels" . | nindent 4 }}
    component: app
spec:
  {{- if .Values.podDisruptionBudget.app.minAvailable }}
  minAvailable: {{ .Values.podDisruptionBudget.app.minAvailable }}
  {{- end }}
  {{- if .Values.podDisruptionBudget.app.maxUnavailable }}
  maxUnavailable: {{ .Values.podDisruptionBudget.app.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "devpulse.selectorLabels" . | nindent 6 }}
      component: app
  unhealthyPodEvictionPolicy: IfHealthyBudget

---
{{- end }}

{{- if .Values.podDisruptionBudget.database }}
apiVersion: policy/v1
