# DevPulse Nginx Configuration - High Availability Setup
# Features:
# - Load balancing across 3 app instances
# - Sticky sessions for WebSocket connections
# - Health checks for all backends
# - Rate limiting
# - Security headers
# - SSL/TLS support (uncomment for production)
# - Connection pooling

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ============ LOGGING ============
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'upstream_addr=$upstream_addr upstream_status=$upstream_status';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # ============ PERFORMANCE ============
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Buffer sizes
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # Timeouts
    client_body_timeout 20s;
    client_header_timeout 20s;
    send_timeout 20s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/rss+xml 
               application/atom+xml image/svg+xml;

    # ============ RATE LIMITING ============
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
    limit_req_zone $http_x_forwarded_for zone=api_real:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_conn addr 100;

    # ============ LOAD BALANCING ============
    
    # Upstream backend with health check
    upstream app_backend {
        # Session persistence (hash based on client IP + connection)
        hash $remote_addr consistent;
        
        # 3 application instances with health checks
        server app-1:3000 weight=1 max_fails=3 fail_timeout=30s;
        server app-2:3000 weight=1 max_fails=3 fail_timeout=30s;
        server app-3:3000 weight=1 max_fails=3 fail_timeout=30s;
        
        # Keep-alive connections to backends
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    # ============ SECURITY HEADERS ============
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # HSTS (only in production with SSL)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # CSP (Content Security Policy)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" always;

    # ============ SERVERS ============
    
    # HTTP Server (redirect to HTTPS in production)
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Redirect HTTP to HTTPS in production
        # return 301 https://$host$request_uri;

        root /usr/share/nginx/html;
        index index.html index.htm;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
        }

        # Favicon
        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }

        # SPA routing - serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
            expires 0;
            add_header Cache-Control "public, max-age=0, must-revalidate";
        }

        # API proxy
        location /api/ {
            limit_req zone=api_real burst=20 nodelay;
            limit_conn addr 100;

            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            
            # Headers for backend
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_cache_bypass $http_upgrade;

            # Connection pooling
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # WebSocket support (long-lived connections)
        location /ws {
            limit_req zone=api_real burst=10 nodelay;

            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket specific timeouts (no timeout for keep-alive)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 7d;
            
            # Disable buffering for WebSocket
            proxy_buffering off;
        }

        # Health check endpoint
        location /health {
            access_log off;
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        # Status endpoint for monitoring
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker network
            deny all;
        }

        # Monitoring endpoints
        location ~ ^/(prometheus|grafana|health|metrics) {
            access_log off;
            proxy_pass http://app_backend;
        }

        # Deny access to sensitive files
        location ~ /\. {
            deny all;
        }

        location ~ ~$ {
            deny all;
        }
    }

    # HTTPS Server (production configuration - uncomment and configure)
    # server {
    #     listen 443 ssl http2 default_server;
    #     listen [::]:443 ssl http2 default_server;
    #     server_name your-domain.com;

    #     # SSL configuration
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #     ssl_session_tickets off;

    #     # Include all location blocks from HTTP server
    #     root /usr/share/nginx/html;
    #     # ... rest of configuration ...
    # }

    # Redirect HTTP to HTTPS (production only)
    # server {
    #     listen 80;
    #     listen [::]:80;
    #     return 301 https://$host$request_uri;
    # }
}
