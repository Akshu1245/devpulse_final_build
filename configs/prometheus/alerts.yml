# Prometheus Alert Rules for High-Availability DevPulse
# Monitors critical infrastructure metrics and triggers alerts

groups:
  - name: PostgreSQL
    interval: 15s
    rules:
      # Database connection alerts
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          service: postgresql
        annotations:
          summary: "PostgreSQL {{ $labels.instance }} is down"
          description: "PostgreSQL instance {{ $labels.instance }} has been down for more than 1 minute"

      # Replication lag alert (>5 seconds = critical)
      - alert: PostgreSQLReplicationLag
        expr: pg_replication_lag > 5
        for: 2m
        labels:
          severity: warning
          service: postgresql
        annotations:
          summary: "PostgreSQL replication lag is high"
          description: "Replica lag is {{ $value }} seconds (threshold: 5s)"

      # Connection pool exhaustion
      - alert: PostgreSQLConnectionPool
        expr: pg_stat_activity_count > 80
        for: 2m
        labels:
          severity: warning
          service: postgresql
        annotations:
          summary: "PostgreSQL connection pool nearly exhausted"
          description: "{{ $value }} connections out of 100 max"

      # Replica not connected
      - alert: PostgreSQLReplicaNotConnected
        expr: pg_replication_slots_active == 0
        for: 1m
        labels:
          severity: critical
          service: postgresql
        annotations:
          summary: "PostgreSQL replica not connected"
          description: "No active replication slots detected"

  - name: Redis
    interval: 15s
    rules:
      # Redis Master down alert
      - alert: RedisMasterDown
        expr: redis_up{role="master"} == 0
        for: 30s
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis Master is down"
          description: "Redis master has been unreachable for 30 seconds"

      # Redis Replica down alert
      - alert: RedisReplicaDown
        expr: redis_up{role="slave"} == 0
        for: 2m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis Replica {{ $labels.instance }} is down"
          description: "Redis replica has been unreachable for 2 minutes"

      # Redis Sentinel quorum lost (< 3 sentinels)
      - alert: RedisSentinelQuorumLost
        expr: redis_sentinel_active_sentinels < 3
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis Sentinel quorum lost"
          description: "Only {{ $value }} sentinels are active (need 3)"

      # Redis replication backlog exhausted
      - alert: RedisReplicationBacklog
        expr: redis_replication_backlog_size / redis_config_repl_backlog_size > 0.9
        for: 2m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis replication backlog nearly full"
          description: "Backlog is {{ humanize $value }}% full"

      # Redis memory usage critical
      - alert: RedisMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 2m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis memory usage critical"
          description: "Redis is using {{ humanize $value }}% of max memory"

  - name: Application
    interval: 15s
    rules:
      # Application instance down
      - alert: AppInstanceDown
        expr: up{job=~"devpulse-app-.*"} == 0
        for: 30s
        labels:
          severity: critical
          service: application
        annotations:
          summary: "Application instance {{ $labels.instance }} is down"
          description: "Application instance {{ $labels.instance }} has been unreachable for 30 seconds"

      # Fewer than 2 app instances available
      - alert: InsufficientAppInstances
        expr: count(up{job=~"devpulse-app-.*"} == 1) < 2
        for: 1m
        labels:
          severity: warning
          service: application
        annotations:
          summary: "Insufficient application instances available"
          description: "Only {{ $value }} of 3 app instances are running"

      # High error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: application
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} (threshold: 0.05)"

      # High response time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          service: application
        annotations:
          summary: "High 95th percentile response time"
          description: "P95 response time is {{ $value }}s"

  - name: Worker
    interval: 15s
    rules:
      # Worker instance down
      - alert: WorkerInstanceDown
        expr: up{job=~"devpulse-worker-.*"} == 0
        for: 2m
        labels:
          severity: warning
          service: worker
        annotations:
          summary: "Worker instance {{ $labels.instance }} is down"
          description: "Worker instance {{ $labels.instance }} has been down for 2 minutes"

      # Queue depth too high (>1000 jobs)
      - alert: BullMQQueueDepth
        expr: bullmq_queue_size > 1000
        for: 5m
        labels:
          severity: warning
          service: worker
        annotations:
          summary: "BullMQ queue depth is high"
          description: "Queue {{ $labels.queue }} has {{ $value }} pending jobs"

      # Job failure rate high (>10%)
      - alert: BullMQFailureRate
        expr: rate(bullmq_job_failed_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: worker
        annotations:
          summary: "High BullMQ job failure rate"
          description: "Job failure rate is {{ humanize $value }}/sec"

  - name: Infrastructure
    interval: 15s
    rules:
      # Disk usage > 80%
      - alert: HighDiskUsage
        expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.2
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "High disk usage"
          description: "{{ $labels.mountpoint }} is {{ humanize (1 - $value) }}% full"

      # CPU usage > 80%
      - alert: HighCPUUsage
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%"

      # Memory usage > 80%
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.8
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ humanize (1 - $value) }}%"

  - name: LoadBalancer
    interval: 15s
    rules:
      # Nginx down
      - alert: NginxDown
        expr: up{job="nginx"} == 0
        for: 30s
        labels:
          severity: critical
          service: nginx
        annotations:
          summary: "Nginx reverse proxy is down"
          description: "Nginx has been unreachable for 30 seconds"

      # High connection rate
      - alert: NginxHighConnections
        expr: nginx_connections_active > 1000
        for: 5m
        labels:
          severity: warning
          service: nginx
        annotations:
          summary: "Nginx has many active connections"
          description: "{{ $value }} active connections"

  - name: SLO
    interval: 60s
    rules:
      # 99.9% uptime SLO - availability check
      - alert: SLOAvailabilityViolation
        expr: |
          (
            count(up{job=~"devpulse-app-.*"} == 1) / 
            count(up{job=~"devpulse-app-.*"})
          ) < 0.999
        for: 5m
        labels:
          severity: critical
          service: slo
        annotations:
          summary: "99.9% availability SLO violated"
          description: "Application availability is {{ $value | humanizePercentage }}"

      # Database replication lag SLO - < 1 second
      - alert: SLOReplicationLagViolation
        expr: pg_replication_lag > 1
        for: 5m
        labels:
          severity: critical
          service: slo
        annotations:
          summary: "Replication lag SLO violated"
          description: "Replication lag is {{ $value }}s (SLO: < 1s)"
