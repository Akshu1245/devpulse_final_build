# Redis Sentinel 3 Configuration
# Part of 3-Sentinel cluster for automatic Redis failover

port 26379
dir /data
logfile /data/sentinel.log
loglevel notice

# Master configuration
sentinel monitor devpulse-master redis-master 6379 2
sentinel auth-pass devpulse-master ${REDIS_PASSWORD}
sentinel auth-user devpulse-master default

# Failover settings
sentinel down-after-milliseconds devpulse-master 5000
sentinel parallel-syncs devpulse-master 1
sentinel failover-timeout devpulse-master 10000

# Connect timeout and read timeout
sentinel deny-scripts-reconfig yes

# ACL
requirepass ${REDIS_PASSWORD}
masterauth ${REDIS_PASSWORD}

# High-availability tuning
sentinel min-slaves-to-write 0
sentinel min-slaves-max-lag 10

# Persistence
save ""
appendonly yes
appendfsync everysec
