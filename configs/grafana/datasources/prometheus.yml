apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      exemplarTraceIdDestinations:
        - name: Jaeger
          url: http://jaeger:16686
          refId: jaeger

  - name: Prometheus (Alertmanager)
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    isDefault: false
    editable: true

  - name: Loki (Logs)
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      derivedFields:
        - matcherRegex: 'request_id=(\w+)'
          name: request_id
          url: 'http://jaeger:16686/trace/$${__value}'
